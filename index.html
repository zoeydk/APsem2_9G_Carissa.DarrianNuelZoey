/* THERMAL ENERGY */
const thermalPage = `
<h1>Thermal Energy</h1>
<p>Thermal energy is the total kinetic energy of particles (atoms/molecules) in a system, depending on mass and speed.<br>
Heat is the transfer of energy due to a temperature difference, moving from hotter to cooler bodies. Methods: <br>
Conduction: Transfer through direct contact.<br>
Convection: Transfer by fluid movement<br>
Radiation: Transfer by electromagnetic waves
</p>

<p>Thermal properties:<br>
Specific heat capacity: Amount of energy needed to change the temperature of a substance (1kg) by 1C<br>
Latent heat: Amount of energy needed to change the phase of a substance (Melting, Boiling, or evaporation)<br>
Thermal expansion: The increase in a material’s length, area, or volume, due to rising temperatures.<br>
Formula: Length change (m) = Initial length (m) × CTE × Temperature change
</p>

<p>Key factors influencing thermal expansion:<br>
Different materials expand at different rates. Metals generally have higher expansion coefficients than ceramics or plastics.<br>
A greater increase in temperature causes greater expansion, while a decrease causes contraction.<br>
A longer rod or larger volume will experience a greater total change in length or volume compared to a smaller one, assuming the same material<br>
Higher pressure usually reduces the amount of thermal expansion in liquids.
</p>

<p>Pressure formula = P1/T1 = P2/T2<br>P = Pressure<br>T = Temperature</p>

/* STATIC ELECTRICITY */
const staticPage = `
<h1>Static Electricity</h1>
<p>In the video, it was shown that my friend rubbed a plastic sheet with a piece of cloth and then used the plastic sheet to pull a metallic can toward it. This demonstration illustrates the concept of static electricity. When the plastic sheet was wiped with the cloth, friction caused electrons to transfer from one material to the other, leaving the plastic sheet electrically charged. As a result, the plastic gained a static charge. When the charged plastic sheet was brought near the metallic can, it caused the charges inside the can to rearrange due to electrostatic induction. The side of the can closest to the plastic became oppositely charged, creating an attractive force between the two objects. This force was strong enough to move the can, even though it was initially neutral.</p>
<img src="https://www.aydemperakende.com.tr/storage/blog/65cb7bc8768dd-why_does_static_electricity_occur.jpg" class="topic-img">

/* ELECTROMAGNETIC INDUCTION */
const electromagneticPage = `
<h1>Electro Magnetic Induction</h1>
<p>Electromagnetic induction is defined as the production of voltage across an electric conductor in a changing magnetic field or when the conductor moves through a stationary magnetic field, resulting in the generation of electric current. This happens because when a conductor is placed in a varying magnetic field, an electromotive force is induced. The currents captured in this phenomena can be captured and used as electricity. This process is called induction because there is no physical connection between the inductor and the magnet.</p>

<p>To induce the voltage you can move a magnet toward or away from the coil or rotate the coil within a magnetic field.</p>
<p>You can also increase the voltage by increasing the amount of wire or wire turns because it increases the total amount of conductor length cutting through the magnetic field multiplying the effect.</p>
<p>Converts mechanical energy into electrical energy by rotating a coil in a magnetic field.</p>

<p>Faraday's Law: The induced electromotive force is proportional to the rate of the change of magnetic flux through the coil. This happens because of the conservation of energy and the nature of magnetic force on electrons. A faster change in magnetic flux through a coil creates a stronger magnetic force on electrons.</p>

<p>Faraday's First Law: Whenever there is a change in the magnetic flux passing through the coil of a wire, an electromotive force (emf) is induced in the coil.</p>

<img src="https://www.adda247.com/jobs/wp-content/uploads/sites/2/2023/07/21115134/Faradays-Law.jpg" class="topic-img">
`;
